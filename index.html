<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Relax Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-animation">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>
    <div class="card-wrapper">
        <div class="illustration-panel">
            <img src="character.png" alt="Character Illustration">
        </div>

        <div class="timer-container">
            <h1>Relax Timer</h1>

            <div class="circle-progress">
                <svg class="progress-ring" width="240" height="240">
                    <circle class="progress-ring__circle-bg" stroke="rgba(255, 255, 255, 0.2)" stroke-width="8"
                        fill="transparent" r="110" cx="120" cy="120" />
                    <circle class="progress-ring__circle" stroke="#ffffff" stroke-width="8" fill="transparent" r="110"
                        cx="120" cy="120" />
                </svg>
                <div class="time-display" id="time-display">01:00</div>
            </div>

            <div class="presets">
                <div class="preset-wrapper">
                    <span class="preset-label">メモ書き<br>（0秒思考）</span>
                    <button class="preset-btn active" data-time="60">1分</button>
                </div>
                <div class="preset-wrapper">
                    <span class="preset-label">スピーチ・<br>休息</span>
                    <button class="preset-btn" data-time="180">3分</button>
                </div>
                <div class="preset-wrapper">
                    <span class="preset-label">マインドフルネス</span>
                    <button class="preset-btn" data-time="300">5分</button>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn" id="decrease-btn" title="減らす">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14"></path>
                    </svg>
                </button>
                <button class="control-btn main-btn" id="start-pause-btn">開始</button>
                <button class="control-btn" id="reset-btn" title="リセット">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                    </svg>
                </button>
                <button class="control-btn" id="increase-btn" title="増やす">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"></path>
                    </svg>
                </button>
            </div>

            <div class="volume-test">
                <button id="test-sound-btn" class="text-btn">♪ 音のテスト</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
